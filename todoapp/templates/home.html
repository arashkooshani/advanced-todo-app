<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Welcome</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            color: #444;
            margin-bottom: 30px;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: 0.3s ease;
        }

        .buttons a.login {
            background: #667eea;
        }

        .buttons a.login:hover {
            background: #5a67d8;
        }

        .buttons a.register {
            background: #764ba2;
        }

        .buttons a.register:hover {
            background: #5f3b82;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .buttons a {
                width: 100%;
                margin: 8px 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to Task Manager</h1>

    <div class="buttons">
        <a href="{% url 'login' %}" class="login">Login</a>
        <a href="#" class="register">Register</a>
    </div>
</div>

</body>
</html>
